<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#FAF7F2" />
  <title>GuideMark — Independent Guide Reviews</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FAF7F2; }
    ::-webkit-scrollbar { display: none; }
    select { -webkit-appearance: none; appearance: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const guides = [
      {
        id: 1, name: "Elena Marchetti", city: "Rome", country: "Italy",
        specialty: "Ancient Rome & Vatican", languages: ["EN", "IT", "FR"],
        rating: 4.9, reviewCount: 312, years: 14, verified: true,
        initials: "EM", color: "#8B6914", bg: "#F5EDD8",
        badge: "Top Rated", available: true,
        tours: ["Colosseum & Forum", "Vatican Deep Dive", "Hidden Trastevere"],
        bio: "Fourteen years guiding the Eternal City. I specialize in the layers — what's visible and what's beneath. No headsets. No crowds. Just Rome as it deserves to be seen.",
        reviews: [
          { author: "James & Carol T.", rating: 5, text: "Elena found us a trattoria that's been in one family for 90 years. No TripAdvisor listing. Just real Rome.", date: "Oct 2024", tour: "Hidden Trastevere" },
          { author: "Margaret F.", rating: 5, text: "She brought out a fragment of Roman tile and let my daughter hold it. That moment is why you travel.", date: "Sep 2024", tour: "Colosseum & Forum" },
          { author: "Robert A.", rating: 5, text: "I've read three books on Roman history. Elena told me things not in any of them.", date: "Aug 2024", tour: "Vatican Deep Dive" },
        ]
      },
      {
        id: 2, name: "Thomas Beaumont", city: "Paris", country: "France",
        specialty: "Art & Architecture", languages: ["EN", "FR"],
        rating: 4.8, reviewCount: 198, years: 9, verified: true,
        initials: "TB", color: "#2C5F7A", bg: "#D8EAF2",
        badge: "Families", available: true,
        tours: ["Louvre Without the Crowds", "Marais & Le Monde Juif", "Impressionist Paris"],
        bio: "Art historian by training, guide by calling. Paris rewards patience. I build tours around that — fewer rooms, deeper looking, more time to stand still in front of something extraordinary.",
        reviews: [
          { author: "The Okonkwo Family", rating: 5, text: "Thomas brought a reproduction Delacroix sketch and let our 10-year-old hold it. That moment made the whole trip.", date: "May 2024", tour: "Louvre Without the Crowds" },
          { author: "Lin & David P.", rating: 5, text: "He knew which gallery would be quiet at 9am. We had the Winged Victory almost to ourselves.", date: "Apr 2024", tour: "Louvre Without the Crowds" },
        ]
      },
      {
        id: 3, name: "Bruno Almeida", city: "Lisbon", country: "Portugal",
        specialty: "Sintra, Cascais & the Coast", languages: ["EN", "PT", "ES"],
        rating: 4.9, reviewCount: 276, years: 11, verified: true,
        initials: "BA", color: "#5C7A2C", bg: "#E2EDD8",
        badge: "Top Rated", available: true,
        tours: ["Sintra Palaces & Pena", "Cabo da Roca & Cascais", "Lisbon Hidden Quarters"],
        bio: "Born in Cascais, trained as an architect, became a guide when I realized buildings want to be explained. I know every road between Lisbon and Cabo da Roca. I'll take you to the edge of the known world.",
        reviews: [
          { author: "Sarah & Tom M.", rating: 5, text: "Bruno stood at Cabo da Roca and recited Camões from memory. We stood there in the wind and felt it.", date: "Mar 2024", tour: "Cabo da Roca & Cascais" },
          { author: "The Walsh Family", rating: 5, text: "Pena Palace with a private guide is a completely different experience. Bruno gave us the whole history.", date: "Feb 2024", tour: "Sintra Palaces & Pena" },
        ]
      },
      {
        id: 4, name: "Klaus Weber", city: "Munich", country: "Germany",
        specialty: "History & Christmas Markets", languages: ["EN", "DE"],
        rating: 4.8, reviewCount: 189, years: 16, verified: true,
        initials: "KW", color: "#7A3B2C", bg: "#F2E0DC",
        badge: "History Expert", available: false,
        tours: ["Munich's Dark History", "Christmas Market Circuit", "Royal Bavaria"],
        bio: "Sixteen years interpreting Bavaria for visitors who want more than beer halls and lederhosen — though I know those too. My specialty is the 20th century, which Munich cannot escape and should not.",
        reviews: [
          { author: "Richard & Anne B.", rating: 5, text: "Klaus walked us through the sites of 1923 and 1938. Quiet, careful, essential. Travel at its most necessary.", date: "Dec 2023", tour: "Munich's Dark History" },
          { author: "The Henderson Group", rating: 5, text: "The Christmas Market tour was the highlight of our entire trip to Germany.", date: "Dec 2023", tour: "Christmas Market Circuit" },
        ]
      },
      {
        id: 5, name: "Ingrid Hoffmann", city: "Nuremberg", country: "Germany",
        specialty: "Medieval History & Trials", languages: ["EN", "DE", "FR"],
        rating: 4.9, reviewCount: 143, years: 8, verified: true,
        initials: "IH", color: "#5C3A7A", bg: "#E8D8F2",
        badge: "Rising", available: true,
        tours: ["The Nuremberg Trials", "Medieval Old Town", "Christmas Market & Craft Beer"],
        bio: "I grew up in the shadow of the Palace of Justice. Eight years explaining what happened here — at the trials, in the old town, in the market squares — to travelers who come wanting to understand.",
        reviews: [
          { author: "David & Carol S.", rating: 5, text: "Standing in the actual courtroom where the trials happened, with Ingrid explaining the proceedings — unforgettable.", date: "Nov 2023", tour: "The Nuremberg Trials" },
        ]
      },
      {
        id: 6, name: "Carmen Reyes", city: "Madrid", country: "Spain",
        specialty: "Prado & Spanish Golden Age", languages: ["EN", "ES"],
        rating: 4.7, reviewCount: 221, years: 12, verified: true,
        initials: "CR", color: "#7A5C2C", bg: "#F2EAD8",
        badge: null, available: true,
        tours: ["Prado in Depth", "Bourbon Madrid", "Literary Cafés & Hidden Courtyards"],
        bio: "Art historian, former Prado docent, now independent. I left the institution because the best conversations about Velázquez happen in the gallery, not in an auditorium.",
        reviews: [
          { author: "Paul & Jane T.", rating: 5, text: "Carmen stood us in front of Las Meninas for forty minutes. We did not move. We did not want to.", date: "Sep 2024", tour: "Prado in Depth" },
          { author: "Michael R.", rating: 4, text: "Deeply knowledgeable. The kind of guide who changes how you see painting.", date: "Aug 2024", tour: "Prado in Depth" },
        ]
      },
    ];

    const cities = ["All", "Rome", "Paris", "Lisbon", "Munich", "Nuremberg", "Madrid"];

    function Stars({ rating, size = 12 }) {
      return (
        <span style={{ display: "inline-flex", gap: 1 }}>
          {[1,2,3,4,5].map(s => (
            <svg key={s} width={size} height={size} viewBox="0 0 20 20" fill={s <= Math.round(rating) ? "#C4931A" : "#E0D5C0"}>
              <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
            </svg>
          ))}
        </span>
      );
    }

    function GuideDetailView({ guide, onBack }) {
      const [tab, setTab] = useState("about");
      const [contacted, setContacted] = useState(false);
      return (
        <div style={{ flex: 1, overflowY: "auto", background: "#FAF7F2" }}>
          <div style={{ background: guide.color, paddingBottom: 32 }}>
            <div style={{ display: "flex", alignItems: "center", padding: "16px 20px 0", gap: 12 }}>
              <button onClick={onBack} style={{ background: "rgba(255,255,255,0.2)", border: "none", borderRadius: "50%", width: 36, height: 36, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: "#fff", fontSize: 20 }}>‹</button>
              <span style={{ color: "rgba(255,255,255,0.8)", fontSize: 13, fontFamily: "'DM Sans', sans-serif" }}>{guide.city}</span>
            </div>
            <div style={{ padding: "20px 20px 0", display: "flex", gap: 16, alignItems: "flex-end" }}>
              <div style={{ width: 72, height: 72, borderRadius: "50%", background: "rgba(255,255,255,0.25)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Cormorant Garamond', serif", fontSize: 26, fontWeight: 700, color: "#fff", flexShrink: 0, border: "2px solid rgba(255,255,255,0.4)" }}>{guide.initials}</div>
              <div style={{ flex: 1, paddingBottom: 4 }}>
                <h2 style={{ margin: 0, fontFamily: "'Cormorant Garamond', serif", fontSize: 24, fontWeight: 700, color: "#fff", lineHeight: 1.2 }}>{guide.name}</h2>
                <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 13, fontFamily: "'DM Sans', sans-serif", marginTop: 3 }}>{guide.specialty}</div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 6 }}>
                  <Stars rating={guide.rating} size={13} />
                  <span style={{ color: "#fff", fontWeight: 600, fontSize: 13, fontFamily: "'DM Sans', sans-serif" }}>{guide.rating}</span>
                  <span style={{ color: "rgba(255,255,255,0.7)", fontSize: 12, fontFamily: "'DM Sans', sans-serif" }}>({guide.reviewCount})</span>
                </div>
              </div>
            </div>
            <div style={{ display: "flex", marginTop: 20, borderBottom: "1px solid rgba(255,255,255,0.2)" }}>
              {["about", "tours", "reviews"].map(t => (
                <button key={t} onClick={() => setTab(t)} style={{ flex: 1, padding: "10px 0", border: "none", background: "none", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: tab === t ? 600 : 400, color: tab === t ? "#fff" : "rgba(255,255,255,0.6)", borderBottom: tab === t ? "2px solid #fff" : "2px solid transparent", textTransform: "capitalize" }}>{t}</button>
              ))}
            </div>
          </div>
          <div style={{ padding: "20px 20px 120px" }}>
            {tab === "about" && (
              <>
                <p style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 18, lineHeight: 1.7, color: "#3A3020", margin: "0 0 20px", fontStyle: "italic" }}>"{guide.bio}"</p>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
                  {[["Experience", `${guide.years} yrs`], ["Languages", guide.languages.join(" · ")], ["City", guide.city], ["Status", guide.available ? "Available" : "Booked Out"]].map(([l, v]) => (
                    <div key={l} style={{ background: "#fff", borderRadius: 10, padding: "12px 14px", border: "1px solid #EDE5D5" }}>
                      <div style={{ fontSize: 10, color: "#9A8E7A", textTransform: "uppercase", letterSpacing: 1, fontFamily: "'DM Sans', sans-serif", marginBottom: 3 }}>{l}</div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "#1C1712", fontFamily: "'DM Sans', sans-serif" }}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{ background: "#FBF7EE", borderRadius: 10, padding: "12px 16px", border: "1px solid #EDE5D5" }}>
                  <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#9A8E7A", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>GuideMark Promise</div>
                  <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#5A5040", lineHeight: 1.6 }}>This ranking reflects only real traveler reviews. No paid placement. No algorithm. What you see is what guides have earned.</div>
                </div>
              </>
            )}
            {tab === "tours" && (
              <div>
                {guide.tours.map((tour, i) => (
                  <div key={i} style={{ background: "#fff", borderRadius: 12, padding: 16, marginBottom: 10, border: "1px solid #EDE5D5" }}>
                    <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 17, fontWeight: 600, color: "#1C1712", marginBottom: 4 }}>{tour}</div>
                    <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#9A8E7A" }}>Private & small group · Contact guide for scheduling</div>
                  </div>
                ))}
                <div style={{ background: "#FBF7EE", borderRadius: 10, padding: "14px 16px", border: "1px solid #EDE5D5", marginTop: 6 }}>
                  <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#5A5040", lineHeight: 1.6 }}>💡 GuideMark connects you directly with the guide — no commission fees, no middleman markup.</div>
                </div>
              </div>
            )}
            {tab === "reviews" && (
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 16, background: "#fff", borderRadius: 12, padding: 16, border: "1px solid #EDE5D5" }}>
                  <div style={{ textAlign: "center" }}>
                    <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 40, fontWeight: 700, color: guide.color, lineHeight: 1 }}>{guide.rating}</div>
                    <Stars rating={guide.rating} size={14} />
                    <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#9A8E7A", marginTop: 3 }}>{guide.reviewCount} reviews</div>
                  </div>
                  <div style={{ flex: 1, paddingLeft: 12, borderLeft: "1px solid #EDE5D5" }}>
                    <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#5A5040", lineHeight: 1.6 }}>Every review is from a traveler who completed a booking. Rankings cannot be purchased.</div>
                  </div>
                </div>
                {guide.reviews.map((r, i) => (
                  <div key={i} style={{ background: "#fff", borderRadius: 12, padding: 16, marginBottom: 10, border: "1px solid #EDE5D5" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                      <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600, color: "#1C1712" }}>{r.author}</span>
                      <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#9A8E7A" }}>{r.date}</span>
                    </div>
                    <Stars rating={r.rating} size={11} />
                    <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: guide.color, marginTop: 4, marginBottom: 6 }}>{r.tour}</div>
                    <p style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 16, color: "#3A3020", lineHeight: 1.6, margin: 0, fontStyle: "italic" }}>"{r.text}"</p>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, padding: "12px 20px 28px", background: "rgba(250,247,242,0.97)", backdropFilter: "blur(10px)", borderTop: "1px solid #EDE5D5" }}>
            <button onClick={() => setContacted(true)} style={{ width: "100%", padding: 14, background: contacted ? "#5C7A2C" : guide.color, border: "none", borderRadius: 12, color: "#fff", fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 600, cursor: "pointer" }}>
              {contacted ? "✓ Inquiry Sent — Guide Will Respond Shortly" : `Contact ${guide.name.split(" ")[0]} Directly`}
            </button>
          </div>
        </div>
      );
    }

    function GuideCard({ guide, onClick }) {
      return (
        <div onClick={() => onClick(guide)} style={{ background: "#fff", borderRadius: 16, marginBottom: 12, overflow: "hidden", border: "1px solid #EDE5D5", cursor: "pointer", boxShadow: "0 2px 8px rgba(0,0,0,0.04)" }}>
          <div style={{ height: 4, background: guide.color }} />
          <div style={{ padding: "14px 16px" }}>
            <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
              <div style={{ width: 48, height: 48, borderRadius: "50%", background: guide.bg, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Cormorant Garamond', serif", fontSize: 18, fontWeight: 700, color: guide.color, flexShrink: 0 }}>{guide.initials}</div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                  <span style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 17, fontWeight: 700, color: "#1C1712" }}>{guide.name}</span>
                  {guide.badge && <span style={{ fontSize: 10, background: guide.bg, color: guide.color, padding: "2px 8px", borderRadius: 20, fontFamily: "'DM Sans', sans-serif", fontWeight: 600, flexShrink: 0, marginLeft: 6 }}>{guide.badge}</span>}
                </div>
                <div style={{ fontSize: 12, color: "#7A6E5A", fontFamily: "'DM Sans', sans-serif", marginTop: 1 }}>{guide.city} · {guide.specialty}</div>
                <div style={{ display: "flex", alignItems: "center", gap: 5, marginTop: 5 }}>
                  <Stars rating={guide.rating} size={11} />
                  <span style={{ fontSize: 12, fontWeight: 700, color: "#1C1712", fontFamily: "'DM Sans', sans-serif" }}>{guide.rating}</span>
                  <span style={{ fontSize: 11, color: "#9A8E7A", fontFamily: "'DM Sans', sans-serif" }}>({guide.reviewCount})</span>
                  {guide.verified && <span style={{ marginLeft: 4, fontSize: 10, background: "#EBF5EC", color: "#2E7D32", padding: "1px 6px", borderRadius: 20, fontFamily: "'DM Sans', sans-serif", fontWeight: 600 }}>✓</span>}
                  {!guide.available && <span style={{ marginLeft: 4, fontSize: 10, background: "#F5EDE8", color: "#8B4513", padding: "1px 6px", borderRadius: 20, fontFamily: "'DM Sans', sans-serif" }}>Booked</span>}
                </div>
              </div>
            </div>
            <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid #F0E8D8" }}>
              <p style={{ margin: 0, fontFamily: "'Cormorant Garamond', serif", fontSize: 14, color: "#5A4E3A", lineHeight: 1.55, fontStyle: "italic" }}>"{guide.reviews[0].text.substring(0, 90)}{guide.reviews[0].text.length > 90 ? "…" : ""}"</p>
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#9A8E7A", marginTop: 4 }}>— {guide.reviews[0].author}</div>
            </div>
          </div>
        </div>
      );
    }

    function DiscoverTab({ onGuideSelect }) {
      const [city, setCity] = useState("All");
      const [search, setSearch] = useState("");
      const filtered = guides.filter(g => {
        const matchCity = city === "All" || g.city === city;
        const q = search.toLowerCase();
        return matchCity && (!q || g.name.toLowerCase().includes(q) || g.city.toLowerCase().includes(q) || g.specialty.toLowerCase().includes(q));
      });
      return (
        <div style={{ flex: 1, overflowY: "auto", background: "#FAF7F2" }}>
          <div style={{ padding: "12px 16px", background: "#FAF7F2", position: "sticky", top: 0, zIndex: 10, borderBottom: "1px solid #EDE5D5" }}>
            <div style={{ position: "relative" }}>
              <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", fontSize: 16, color: "#9A8E7A" }}>⌕</span>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search guides, cities, specialties..." style={{ width: "100%", padding: "10px 12px 10px 36px", borderRadius: 10, border: "1px solid #DDD5C5", background: "#fff", fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#1C1712", boxSizing: "border-box", outline: "none" }} />
            </div>
          </div>
          <div style={{ display: "flex", gap: 8, padding: "10px 16px", overflowX: "auto" }}>
            {cities.map(c => (
              <button key={c} onClick={() => setCity(c)} style={{ flexShrink: 0, padding: "6px 14px", borderRadius: 20, border: `1px solid ${city === c ? "#8B6914" : "#DDD5C5"}`, background: city === c ? "#8B6914" : "#fff", color: city === c ? "#fff" : "#5A4E3A", fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: city === c ? 600 : 400, cursor: "pointer" }}>{c}</button>
            ))}
          </div>
          <div style={{ padding: "4px 16px 80px" }}>
            <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#9A8E7A", marginBottom: 10 }}>{filtered.length} guide{filtered.length !== 1 ? "s" : ""} · ranked by traveler reviews only</div>
            {filtered.map(g => <GuideCard key={g.id} guide={g} onClick={onGuideSelect} />)}
          </div>
        </div>
      );
    }

    function ReviewTab() {
      const [guide, setGuide] = useState("");
      const [rating, setRating] = useState(0);
      const [hovered, setHovered] = useState(0);
      const [text, setText] = useState("");
      const [submitted, setSubmitted] = useState(false);
      if (submitted) return (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, background: "#FAF7F2" }}>
          <div style={{ width: 72, height: 72, borderRadius: "50%", background: "#EBF5EC", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 32, marginBottom: 20 }}>✓</div>
          <h3 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 24, fontWeight: 700, color: "#1C1712", textAlign: "center", margin: "0 0 12px" }}>Review Submitted</h3>
          <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#5A4E3A", textAlign: "center", lineHeight: 1.7, margin: "0 0 28px" }}>Your review will be verified and published within 24 hours. Thank you for keeping GuideMark honest.</p>
          <button onClick={() => { setSubmitted(false); setGuide(""); setRating(0); setText(""); }} style={{ background: "#8B6914", border: "none", borderRadius: 10, padding: "12px 28px", color: "#fff", fontFamily: "'DM Sans', sans-serif", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>Write Another Review</button>
        </div>
      );
      return (
        <div style={{ flex: 1, overflowY: "auto", background: "#FAF7F2" }}>
          <div style={{ padding: "20px 20px 100px" }}>
            <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 26, fontWeight: 700, color: "#1C1712", margin: "0 0 6px" }}>Write a Review</h2>
            <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#7A6E5A", margin: "0 0 24px", lineHeight: 1.6 }}>Only verified travelers can review. Your honest account keeps rankings real.</p>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, border: "1px solid #EDE5D5", marginBottom: 14 }}>
              <label style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, color: "#9A8E7A", textTransform: "uppercase", letterSpacing: 1, display: "block", marginBottom: 8 }}>Which guide did you use?</label>
              <select value={guide} onChange={e => setGuide(e.target.value)} style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid #DDD5C5", fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: guide ? "#1C1712" : "#9A8E7A", background: "#FAF7F2", outline: "none" }}>
                <option value="">Select a guide...</option>
                {guides.map(g => <option key={g.id} value={g.name}>{g.name} — {g.city}</option>)}
              </select>
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, border: "1px solid #EDE5D5", marginBottom: 14 }}>
              <label style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, color: "#9A8E7A", textTransform: "uppercase", letterSpacing: 1, display: "block", marginBottom: 8 }}>Your rating</label>
              <div style={{ display: "flex", gap: 8 }}>
                {[1,2,3,4,5].map(s => (
                  <button key={s} onMouseEnter={() => setHovered(s)} onMouseLeave={() => setHovered(0)} onClick={() => setRating(s)} style={{ background: "none", border: "none", cursor: "pointer", padding: 0 }}>
                    <svg width={32} height={32} viewBox="0 0 20 20" fill={s <= (hovered || rating) ? "#C4931A" : "#E0D5C0"}>
                      <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                    </svg>
                  </button>
                ))}
              </div>
            </div>
            <div style={{ background: "#fff", borderRadius: 16, padding: 20, border: "1px solid #EDE5D5", marginBottom: 20 }}>
              <label style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, color: "#9A8E7A", textTransform: "uppercase", letterSpacing: 1, display: "block", marginBottom: 8 }}>Your review</label>
              <textarea value={text} onChange={e => setText(e.target.value)} placeholder="What made this experience memorable? Be specific — future travelers will rely on what you write." rows={5} style={{ width: "100%", padding: "10px 12px", borderRadius: 8, border: "1px solid #DDD5C5", fontFamily: "'Cormorant Garamond', serif", fontSize: 16, color: "#1C1712", background: "#FAF7F2", outline: "none", resize: "none", boxSizing: "border-box", lineHeight: 1.6 }} />
            </div>
            <button onClick={() => guide && rating && text.length > 20 && setSubmitted(true)} style={{ width: "100%", padding: 14, background: guide && rating && text.length > 20 ? "#8B6914" : "#C8BFA8", border: "none", borderRadius: 12, color: "#fff", fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 600, cursor: guide && rating && text.length > 20 ? "pointer" : "default" }}>
              Submit Verified Review
            </button>
          </div>
        </div>
      );
    }

    function AboutTab() {
      return (
        <div style={{ flex: 1, overflowY: "auto", background: "#FAF7F2" }}>
          <div style={{ background: "#1C1712", padding: "32px 20px 28px" }}>
            <h2 style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 32, fontWeight: 700, color: "#C4931A", margin: "0 0 8px" }}>GuideMark</h2>
            <p style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#9A8E7A", margin: 0, lineHeight: 1.7 }}>Independent reviews for independent guides.</p>
          </div>
          <div style={{ padding: "20px 20px 100px" }}>
            {[
              { icon: "⭐", title: "Unmanipulated Rankings", text: "Every ranking on GuideMark reflects real traveler reviews and nothing else. Guides cannot pay to improve their position. There is no algorithm that can be gamed." },
              { icon: "✓", title: "Verified Reviews Only", text: "Reviews come only from travelers who completed a confirmed booking. No anonymous reviews, no fake accounts, no review manipulation." },
              { icon: "💬", title: "Direct Connection", text: "Contact guides directly — no platform sitting in the middle, no commission on bookings. The relationship is between you and the guide." },
              { icon: "🏛", title: "Guide-First Platform", text: "We built this for the guides who built their reputations on word of mouth and then watched platforms bury them unless they paid. GuideMark exists to correct that." },
            ].map(({ icon, title, text }) => (
              <div key={title} style={{ background: "#fff", borderRadius: 14, padding: "18px 16px", marginBottom: 12, border: "1px solid #EDE5D5", display: "flex", gap: 14 }}>
                <div style={{ fontSize: 24, flexShrink: 0, lineHeight: 1 }}>{icon}</div>
                <div>
                  <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 17, fontWeight: 700, color: "#1C1712", marginBottom: 5 }}>{title}</div>
                  <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#5A4E3A", lineHeight: 1.65 }}>{text}</div>
                </div>
              </div>
            ))}
            <div style={{ background: "#1C1712", borderRadius: 14, padding: "20px 18px", marginTop: 8 }}>
              <div style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 11, color: "#C4931A", letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>Our Commitment</div>
              <p style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 19, color: "#FAF7F2", lineHeight: 1.6, margin: "0 0 14px", fontStyle: "italic" }}>"Build the platform that travelers trust because guides trust it first."</p>
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#7A6E5A" }}>stillpointtravels.com</div>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("discover");
      const [selectedGuide, setSelectedGuide] = useState(null);
      const tabs = [
        { id: "discover", label: "Discover", icon: "⊕" },
        { id: "review", label: "Review", icon: "✎" },
        { id: "about", label: "About", icon: "◎" },
      ];
      return (
        <div style={{ display: "flex", flexDirection: "column", height: "100vh", maxWidth: 430, margin: "0 auto", background: "#FAF7F2", overflow: "hidden" }}>
          <div style={{ background: selectedGuide ? selectedGuide.color : tab === "about" ? "#1C1712" : "#FAF7F2", padding: "10px 20px 6px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: selectedGuide || tab === "about" ? "#fff" : "#1C1712", fontFamily: "'DM Sans', sans-serif" }}>9:41</span>
            <span style={{ fontSize: 11, color: selectedGuide || tab === "about" ? "rgba(255,255,255,0.7)" : "#9A8E7A", fontFamily: "'DM Sans', sans-serif" }}>●●● ▲ ▌▌</span>
          </div>
          {!selectedGuide && (
            <div style={{ padding: "8px 20px 12px", background: tab === "about" ? "#1C1712" : "#FAF7F2", flexShrink: 0, borderBottom: tab !== "about" ? "1px solid #EDE5D5" : "none" }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontFamily: "'Cormorant Garamond', serif", fontSize: 22, fontWeight: 700, color: tab === "about" ? "#C4931A" : "#1C1712" }}>GuideMark</span>
                <span style={{ fontSize: 10, color: tab === "about" ? "#7A6E5A" : "#9A8E7A", fontFamily: "'DM Sans', sans-serif", letterSpacing: 1.5, textTransform: "uppercase" }}>Independent Reviews</span>
              </div>
            </div>
          )}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {selectedGuide ? (
              <GuideDetailView guide={selectedGuide} onBack={() => setSelectedGuide(null)} />
            ) : (
              <>
                {tab === "discover" && <DiscoverTab onGuideSelect={setSelectedGuide} />}
                {tab === "review" && <ReviewTab />}
                {tab === "about" && <AboutTab />}
              </>
            )}
          </div>
          <div style={{ display: "flex", background: "rgba(250,247,242,0.97)", borderTop: "1px solid #EDE5D5", padding: "8px 0 20px", flexShrink: 0, zIndex: 20 }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => { setSelectedGuide(null); setTab(t.id); }} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, background: "none", border: "none", cursor: "pointer", padding: "6px 0" }}>
                <span style={{ fontSize: 20, color: tab === t.id && !selectedGuide ? "#8B6914" : "#B0A898" }}>{t.icon}</span>
                <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: tab === t.id && !selectedGuide ? 600 : 400, color: tab === t.id && !selectedGuide ? "#8B6914" : "#B0A898" }}>{t.label}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
